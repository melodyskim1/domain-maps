                    {
                        name: "Common Mistakes",
                        categories: [
                            { name: "Pitfalls to Avoid", items: [
                                { term: "Truncated y-axis", definition: "Starting y-axis above zero to exaggerate differences. A bar from 98 to 102 looks dramatic if axis starts at 97.", prompt: "always start y-axis at zero for bar charts — truncating makes small differences look enormous" },
                                { term: "Dual axes", definition: "Two y-axes on same chart. Almost always misleading because scales are independent.", prompt: "avoid dual y-axes — use two separate charts stacked vertically with aligned x-axes instead" },
                                { term: "Too many series", definition: "More than 5-7 lines becomes unreadable. Colors blur together, chart becomes spaghetti.", prompt: "there are 12 lines and it's unreadable — show top 5 as distinct lines, group rest as 'Other' in gray" },
                                { term: "Pie charts for comparison", definition: "Humans are bad at comparing angles. If you need precise comparison, use bar chart.", prompt: "replace pie chart with horizontal bar — slices are too similar, bars make ranking obvious" },
                                { term: "Missing context", definition: "A number without context is meaningless. Is 10,000 users good? Compared to what?", prompt: "add context to metric cards — not just '10,432 users' but '10,432 users (+12% vs last month)'" },
                                { term: "Chart junk", definition: "Unnecessary decoration — 3D effects, excessive gridlines, gratuitous gradients. Remove anything that doesn't encode data.", prompt: "strip chart junk — remove 3D effect, reduce gridlines, remove gradient fills, use flat colors" }
                            ]}
                        ]
                    }
                ]
            },
            "typography": {
                title: "Typography",
                description: "Letterforms, type systems, and the craft of setting text",
                meta: "Domain",
                branches: [
                    {
                        name: "Anatomy & Classification",
                        categories: [
                            { name: "Letterform Anatomy", items: [
                                { term: "Baseline", definition: "The invisible line that letters sit on. The foundation of all typographic alignment. Descenders (g, p, y) hang below it.", prompt: "align the text elements to a shared baseline grid — every line of text across columns should sit on the same horizontal rhythm", imageSearch: "typography+anatomy+baseline+x-height+ascender" },
                                { term: "X-height", definition: "The height of lowercase letters like x, a, e — measured from the baseline to the top of the letter. Fonts with large x-heights feel bigger and more readable at small sizes.", prompt: "choose a font with a generous x-height for the body text — it needs to be readable at 14px on screen, large x-height helps" },
                                { term: "Ascender / descender", definition: "Ascenders are the parts of lowercase letters that extend above the x-height (b, d, h, l). Descenders extend below the baseline (g, p, y, q). Affect line spacing needs.", prompt: "this font has long descenders that are colliding with the next line — increase the line height to give them breathing room" },
                                { term: "Counter", definition: "The enclosed or partially enclosed space inside a letter — the hole in 'o', the bowl of 'a', the opening in 'c'. Open counters improve readability.", prompt: "for small text on screen, choose a font with open counters — letters like a, e, and s won't fill in and become unreadable at small sizes" },
                                { term: "Serif", definition: "The small strokes at the ends of letterforms. Serifs come in many styles — hairline, slab, bracketed, wedge. Each gives a different personality.", prompt: "a slab serif for the headlines — chunky, confident, almost industrial — paired with a clean sans-serif for body text", imageSearch: "serif+types+hairline+slab+bracketed+wedge+typography" },
                                { term: "Terminal", definition: "How a stroke ends on letters without serifs — ball terminals (rounded ends), flat-cut, angled, teardrop. A subtle detail that defines a font's personality.", prompt: "I want a sans-serif with ball terminals — the rounded endings on letters like a, c, f give it a warmer, friendlier feel than flat-cut alternatives" },
                                { term: "Stroke contrast", definition: "The difference between thick and thin strokes within a letter. High contrast (like Didot) = elegant, dramatic. Low contrast (like Futura) = even, geometric.", prompt: "high stroke contrast serif for the display headline — dramatic thicks and thins, elegant and editorial, Didot or Bodoni energy", imageSearch: "high+stroke+contrast+typography+didot+bodoni" },
                                { term: "Ligature", definition: "Two or more letters combined into a single glyph to improve spacing or aesthetics — fi, fl, ff are common. Some are functional, others are decorative.", prompt: "enable OpenType ligatures in the heading — the fi and fl combinations should connect naturally, it's a subtle polish that signals quality", imageSearch: "typography+ligatures+fi+fl+examples" }
                            ]},
                            { name: "Type Classification", items: [
                                { term: "Serif (Old Style, Transitional, Modern, Slab)", definition: "The main serif sub-categories. Old Style (Garamond) = warm, humanist. Transitional (Baskerville) = balanced. Modern (Bodoni) = dramatic contrast. Slab (Rockwell) = sturdy, bold.", prompt: "I need an Old Style serif for a book-like reading experience — something with Garamond's warmth and organic stroke variation, not Bodoni's sharp precision" },
                                { term: "Sans-serif (Grotesque, Neo-grotesque, Geometric, Humanist)", definition: "Grotesque (Akzidenz) = early, slightly irregular. Neo-grotesque (Helvetica) = neutral, uniform. Geometric (Futura) = circles and lines. Humanist (Gill Sans) = warm, calligraphic roots.", prompt: "humanist sans-serif for the interface — something with subtle stroke variation that feels warm and approachable, not cold and geometric" },
                                { term: "Monospaced", definition: "Every character has the same width. Originally for typewriters and terminals. Used for code, data, and when you want that raw, technical aesthetic.", prompt: "monospaced font for the metadata and code blocks — JetBrains Mono or IBM Plex Mono, the fixed width creates a technical, precise feel" },
                                { term: "Display / decorative", definition: "Fonts designed to be used large — headlines, posters, logos. Full of personality, terrible at small sizes, powerful at big ones.", prompt: "find a display font with real character for the hero headline — something I'd never use for body text but that commands attention at 72px" },
                                { term: "Variable font", definition: "A single font file that contains an entire range of weights, widths, or other axes. Smoothly interpolate between thin and black, condensed and extended.", prompt: "use a variable font so I can fine-tune the weight — not just Regular or Bold, but anywhere in between, like weight 450 for a semi-medium that doesn't exist as a static cut" }
                            ]}
                        ]
                    },
                    {
                        name: "Setting Type",
                        categories: [
                            { name: "Spacing & Rhythm", items: [
                                { term: "Tracking (letter-spacing)", definition: "The uniform space between all characters in a block of text. Tight tracking = dense, editorial. Loose tracking = airy, modern. Uppercase text almost always needs more.", prompt: "add tracking to the uppercase section headers — about 0.08em, uppercase text needs more letter-spacing to breathe and be readable" },
                                { term: "Kerning", definition: "Adjusting the space between specific pairs of letters — AV, To, Wa — where the default spacing creates an optical gap. Done per-pair, not uniformly.", prompt: "the kerning between the T and o in the logo looks too wide — tighten that specific pair so they feel naturally spaced", imageSearch: "kerning+typography+before+after+examples" },
                                { term: "Leading (line-height)", definition: "The vertical distance between lines of text, measured baseline to baseline. Too tight = suffocating. Too loose = disconnected. Body text usually wants 1.4-1.7× the font size.", prompt: "increase the leading on the body text to 1.6 — the lines are too tight and it's hard to track from one line to the next" },
                                { term: "Measure (line length)", definition: "How wide a column of text is, counted in characters. 45-75 characters per line is the readable range. Too long and your eye loses its place.", prompt: "constrain the paragraph width to about 65 characters — the lines are running too long, it's hard to find the start of the next line" },
                                { term: "Paragraph spacing", definition: "The space between paragraphs. Can use indents (traditional book style) or vertical spacing (modern web style). Using both is redundant.", prompt: "use space between paragraphs (1em) instead of first-line indents — cleaner for screen reading, don't use both" },
                                { term: "Optical alignment", definition: "Adjusting elements so they look aligned, not just are mathematically aligned. Round letters and punctuation often need to extend slightly past the margin.", prompt: "optically align the pull quote — the opening quotation mark should hang outside the left margin so the actual letterforms align with the body text", imageSearch: "optical+alignment+typography+hanging+punctuation" }
                            ]},
                            { name: "Hierarchy & Scale", items: [
                                { term: "Type scale", definition: "A predefined set of font sizes that create consistent hierarchy. Usually follows a mathematical ratio — 1.25 (major third), 1.333 (perfect fourth), 1.618 (golden ratio).", prompt: "set up a type scale using a 1.25 ratio starting at 16px: 16, 20, 25, 31, 39, 49 — apply these consistently for body, H3, H2, H1, display" },
                                { term: "Weight as hierarchy", definition: "Using different weights (light, regular, medium, bold, black) of the same typeface to create levels of importance. Simpler than using multiple fonts.", prompt: "create hierarchy with weight alone: light for captions, regular for body, medium for subheads, bold for headings — all the same typeface, DM Sans" },
                                { term: "All caps / small caps", definition: "Uppercase letters for emphasis or labels. ALL CAPS is loud; SMALL CAPS (uppercase letterforms at x-height) are refined and traditional. Both need added tracking.", prompt: "use small caps for the byline and date — more refined than full uppercase, add slight tracking, set in the same serif as the body text", imageSearch: "small+caps+typography+examples+editorial" },
                                { term: "Italic vs. oblique", definition: "True italics are redesigned letterforms — different shapes, often more calligraphic. Obliques are just the regular letters slanted. Italics have more character.", prompt: "use true italics for emphasis and book titles — the italic forms should look genuinely different from the roman, not just tilted" }
                            ]}
                        ]
                    },
                    {
                        name: "Pairing & Application",
                        categories: [
                            { name: "Font Pairing", items: [
                                { term: "Contrast pairing", definition: "Combining fonts that are clearly different — a serif with a sans-serif, a display font with a text font. The contrast creates energy and clear hierarchy.", prompt: "pair a high-contrast serif display font for headlines with a clean humanist sans-serif for body — the contrast between ornate and simple defines the hierarchy" },
                                { term: "Concordance pairing", definition: "Combining fonts from the same family or with similar structural features — similar x-height, similar proportions, same designer. Harmony over contrast.", prompt: "pair fonts from the same superfamily — the serif version for body text and the sans-serif version for UI elements, they share DNA so they harmonize naturally" },
                                { term: "One font, many weights", definition: "Using a single typeface with a large weight range to handle everything. Simplest approach, always works, relies on weight contrast for hierarchy.", prompt: "use a single variable font for everything: light for captions, regular for body, semibold for subheads, bold for headlines — consistency through simplicity" },
                                { term: "Display + text pairing", definition: "A decorative or distinctive font for headlines paired with a highly readable font for body text. The display font provides personality; the text font provides comfort.", prompt: "use the display serif only for the hero headline and section titles — everything else (body, captions, UI) uses the workhorse sans-serif" }
                            ]},
                            { name: "Type in Context", items: [
                                { term: "Web fonts / font loading", definition: "How fonts are delivered in a browser — Google Fonts, Adobe Fonts, self-hosted files. Loading strategy affects performance and flash of unstyled text (FOUT).", prompt: "self-host the fonts with font-display: swap — the text renders immediately in a fallback font, then swaps to the custom font when it loads, no invisible text" },
                                { term: "Responsive type", definition: "Font sizes that adapt to screen size — smaller on mobile, larger on desktop. Can use media queries, clamp(), or fluid typography with viewport units.", prompt: "use CSS clamp() for responsive type: clamp(1rem, 2.5vw, 1.5rem) so the font scales smoothly between mobile and desktop without breakpoint jumps" },
                                { term: "Typographic color", definition: "Not actual color — the overall visual density of a text block. Affected by weight, size, line-height, and tracking. Even 'color' = comfortable reading.", prompt: "the typographic color of this paragraph is too uneven — some lines look darker than others, adjust the tracking and word-spacing for more even texture" },
                                { term: "Widows and orphans", definition: "A widow is a single word alone on the last line of a paragraph. An orphan is a single line of a paragraph at the top or bottom of a page. Both look sloppy.", prompt: "fix the widows in the body text — no single words hanging alone on the last line of a paragraph, rewrite slightly or adjust the text block width" },
                                { term: "Hierarchy audit", definition: "Reviewing all the typographic levels in use and asking: is the hierarchy clear? Can you tell what's most important at a glance? Are there too many levels?", prompt: "audit the type hierarchy: how many distinct text styles are in use, is each one doing a clear job, can I reduce the number of styles without losing clarity" }
                            ]}
                        ]
                    }
                ]
            },
            "film-video-editing": {
                title: "Film / Video Editing",
                description: "Cuts, pacing, and the craft of assembling footage",
                meta: "Domain",
                branches: [
                    {
                        name: "Cuts & Transitions",
                        categories: [
                            { name: "Cut Types", items: [
                                { term: "Hard cut", definition: "An instant switch from one shot to the next. No transition effect. The most common edit — invisible when done well, jarring when intentional.", prompt: "hard cuts between interview clips — keep the pacing tight, cut on the end of each thought, no lingering" },
                                { term: "Jump cut", definition: "A cut within the same shot that skips forward in time. The subject stays in roughly the same position but time jumps. Feels urgent, modern, vlog-like.", prompt: "use jump cuts in the talking-head section — trim the pauses and tangents so only the good lines remain, the visible jumps add energy", imageSearch: "jump+cut+video+editing+example" },
                                { term: "J-cut", definition: "The audio from the next scene starts before the video cuts. You hear the new scene before you see it. Creates anticipation and smooth transitions.", prompt: "J-cut into the kitchen scene — we hear the sizzling and conversation while still seeing the previous shot, then cut to the kitchen" },
                                { term: "L-cut", definition: "The opposite of a J-cut — the video cuts to the new scene but the audio from the previous scene continues. Creates continuity and emotional carry-over.", prompt: "L-cut from the interview: cut to b-roll of her workspace while her voice continues over the footage, the audio bridges the visual transition" },
                                { term: "Match cut", definition: "Cutting between two visually similar compositions — a spinning wheel becomes a spinning planet, a doorway in one scene matches a doorway in the next.", prompt: "match cut from the circular coffee cup (overhead shot) to the full moon — same shape, same position in frame, completely different context", imageSearch: "match+cut+film+editing+example" },
                                { term: "Smash cut", definition: "An abrupt cut from a quiet/calm scene to a loud/intense one (or vice versa). The contrast is the point — comedic or shocking.", prompt: "smash cut from the character saying 'what could go wrong?' directly to the chaos scene — the sudden contrast is the joke" },
                                { term: "Cutaway", definition: "A brief shot of something other than the main action — a clock, a reaction, an object — inserted to add context, cover an edit, or build tension.", prompt: "insert cutaways during the interview: her hands, the photos on the wall, the coffee cup — gives visual variety and covers audio edits" },
                                { term: "Cross-cutting / parallel editing", definition: "Alternating between two (or more) scenes happening simultaneously in different locations. Builds tension through juxtaposition.", prompt: "cross-cut between the two conversations happening at the same time — cut back and forth, building tension as both escalate toward the same revelation" }
                            ]},
                            { name: "Transitions", items: [
                                { term: "Dissolve / crossfade", definition: "One shot gradually blends into the next. Implies passage of time, connection between scenes, or a dreamlike shift.", prompt: "dissolve between the young and old versions of the character — the crossfade implies the years passing, hold the overlap for about 1 second" },
                                { term: "Fade to black / fade from black", definition: "The image gradually goes to (or comes from) black. Signals a definitive ending, passage of significant time, or a chapter break.", prompt: "fade to black at the end of the first act — hold the black for 2 seconds before fading up on the new location, it signals a major time jump" },
                                { term: "Whip pan / swish pan", definition: "The camera pans so fast it blurs, then the new scene starts from a matching blur. High energy, seamless, music-video feel.", prompt: "whip pan transition between locations — end the first clip with a fast pan right that blurs, start the next clip with the same blur resolving into the new scene" },
                                { term: "Iris / shape transition", definition: "The frame closes or opens through a shaped mask — circle, diamond, star. Retro, playful, or stylistic.", prompt: "iris-out to end the scene — a circle closes from the edges to the center, old-cinema style, centered on the character's face" }
                            ]}
                        ]
                    },
                    {
                        name: "Pacing & Rhythm",
                        categories: [
                            { name: "Timing", items: [
                                { term: "Pacing", definition: "The speed and rhythm of the edit — how long shots hold, how quickly you cut, how scenes breathe. Fast pacing = energy. Slow pacing = tension or contemplation.", prompt: "tighten the pacing in the middle section — shots are holding too long, cut 20-30% of each clip's duration, keep only the essential moments" },
                                { term: "Beat / pause", definition: "A deliberate moment of stillness or silence between actions or lines. Lets a moment land. The edit equivalent of a rest in music.", prompt: "hold on the character's face for 2 beats after the reveal — let the silence do the work, don't rush to the next line" },
                                { term: "Montage", definition: "A sequence of short shots compressed to show passage of time, skill development, preparation, or emotional journey. Often set to music.", prompt: "training montage: 8-10 shots of increasing difficulty, each 2-4 seconds, cut to the music's rhythm, show progression from struggling to confident" },
                                { term: "Cutting on action", definition: "Cutting during a movement — a hand reaching for a door, a head turning — so the motion carries across the edit and makes it invisible.", prompt: "cut on action: as the character turns to leave, cut to the reverse angle mid-turn — the movement bridges the edit and makes it seamless" },
                                { term: "Cutting to the beat", definition: "Timing edits to land on musical beats or rhythmic accents. Creates a visceral sync between sound and image.", prompt: "cut every shot change to the kick drum — the visual rhythm should lock to the music, each beat brings a new image" },
                                { term: "Letting a shot breathe", definition: "Holding on a shot longer than expected — past the point of information delivery into the territory of atmosphere, emotion, or discomfort.", prompt: "let the final shot breathe — hold on the empty room for 5-6 seconds after the character leaves, the stillness is the emotional punctuation" }
                            ]},
                            { name: "Sequence Structure", items: [
                                { term: "Cold open / hook", definition: "The first 3-10 seconds that determine if someone keeps watching. The most important edit decision in any piece of content.", prompt: "restructure the video to start with the most compelling 5 seconds — the surprising moment, the bold statement, the visual hook — then title card, then context" },
                                { term: "A-roll / B-roll", definition: "A-roll is the primary footage (interview, main action). B-roll is supplementary footage (cutaways, details, environment) that illustrates and adds visual variety.", prompt: "layer B-roll over the interview — when she talks about her studio, show the studio, when she mentions the process, show her hands working" },
                                { term: "Paper edit / assembly", definition: "Organizing all the raw material into a rough order before touching the timeline. Selecting the best takes, finding the story structure, identifying the arc.", prompt: "start with a paper edit: read all the interview transcripts, highlight the best quotes, arrange them into a narrative arc before opening the editing software" },
                                { term: "Rough cut → fine cut → final cut", definition: "The three stages of editing. Rough cut = structure and story. Fine cut = timing and pacing. Final cut = polish, color, sound, and delivery.", prompt: "this is a rough cut — don't worry about color or sound design yet, focus on whether the story structure works and the pacing feels right" }
                            ]}
                        ]
                    },
                    {
                        name: "Audio in Edit",
                        categories: [
                            { name: "Sound Editing", items: [
                                { term: "Room tone / ambience", definition: "The background sound of a space — even 'silence' has a sound. Recording room tone lets you fill gaps without dead silence, which sounds unnatural.", prompt: "fill the gaps between interview clips with room tone — the background hum should be continuous so edits don't create jarring silence" },
                                { term: "Audio ducking", definition: "Automatically lowering background music when dialogue or voiceover plays, then bringing it back up in pauses. Creates clear hierarchy.", prompt: "duck the music under the voiceover — drop it to about 20% when she's speaking, bring it back up between sections" },
                                { term: "Sound design / foley", definition: "Adding or enhancing sounds that sell the reality — footsteps, cloth movement, door latches, environmental sounds. The sounds you don't notice until they're missing.", prompt: "add subtle foley to the cooking scene — the knife on the cutting board, the sizzle of the pan, the clink of a plate, it should feel real and present" },
                                { term: "Music as emotional cue", definition: "Music tells the audience how to feel. Swelling strings = emotion. Driving drums = urgency. Absence of music = tension or reality.", prompt: "pull the music out completely during the reveal — the silence makes the moment heavier, then bring the music back slowly as the character processes" },
                                { term: "Audio levels / mixing", definition: "Balancing the volume of dialogue, music, and sound effects so everything is clear and nothing fights for attention.", prompt: "mix the audio so dialogue is always the loudest element — music sits underneath, sound effects punctuate but never compete with the voice" }
                            ]}
                        ]
                    },
                    {
                        name: "Visual Treatment",
                        categories: [
                            { name: "Color & Grade", items: [
                                { term: "Color correction", definition: "Making footage look 'correct' — proper white balance, exposure, consistent skin tones across clips. The technical fix before the creative grade.", prompt: "color correct across all the interview clips first — match the skin tones and exposure so cutting between them looks seamless" },
                                { term: "Color grading", definition: "The creative color treatment applied after correction — warm and golden, desaturated and moody, teal-and-orange cinematic. Sets the visual mood.", prompt: "grade the piece with warm, slightly desaturated tones — golden highlights, muted shadows, a nostalgic film-like quality" },
                                { term: "LUT (Look-Up Table)", definition: "A preset color transformation applied to footage. Like a filter but more sophisticated — maps input colors to output colors. Starting point for a grade.", prompt: "apply a film emulation LUT as a starting point — Kodak Portra 400 look, then fine-tune the warmth and contrast from there", imageSearch: "LUT+color+grading+before+after+film" },
                                { term: "Log footage", definition: "A flat, desaturated recording format that preserves maximum dynamic range. Looks terrible out of camera but gives the most flexibility in grading.", prompt: "the footage was shot in log — it needs a base conversion to Rec.709 before grading, the flat look is intentional for post flexibility", imageSearch: "log+footage+flat+vs+graded+comparison" }
                            ]},
                            { name: "Framing & Reframing", items: [
                                { term: "Reframing / crop", definition: "Adjusting the frame in post — zooming in to create a tighter shot, repositioning to fix composition, or punching in to simulate a second camera angle.", prompt: "punch in to a close-up during the emotional moment — crop from the wide to just the face, it simulates a camera move and adds emphasis" },
                                { term: "Ken Burns effect", definition: "A slow pan or zoom across a still image. Named after the documentarian. Brings static photos to life in video.", prompt: "Ken Burns effect on the archival photos — slow zoom in on the faces, gentle pan across the group shot, 6-8 seconds per image", imageSearch: "ken+burns+effect+documentary+photo" },
                                { term: "Speed ramp", definition: "Changing playback speed within a single clip — normal speed to slow motion and back. Creates dramatic emphasis at the key moment.", prompt: "speed ramp: normal speed as she throws the clay on the wheel, ramp to 40% slow-mo as it centers, then back to normal — the moment of contact is the emphasis" },
                                { term: "Stabilization", definition: "Removing unwanted camera shake in post. Can save handheld footage but may crop the frame and introduce warping if pushed too hard.", prompt: "stabilize the handheld walking shots — smooth out the bumps but keep a little natural movement, don't make it feel robotic" }
                            ]}
                        ]
                    },
                    {
                        name: "Text & Graphics",
                        categories: [
                            { name: "On-Screen Elements", items: [
                                { term: "Lower third", definition: "A text graphic in the lower portion of the screen identifying a speaker — name and title. Standard in documentaries, interviews, and news.", prompt: "minimal lower third: name in medium weight, title below in lighter weight, simple line accent, appears for 4 seconds, fade in and out", imageSearch: "lower+third+graphic+design+minimal" },
                                { term: "Title card", definition: "A full-screen or prominent text element — the video title, a chapter heading, or a date/location stamp. Sets context.", prompt: "title card on black: the title in a clean serif font, centered, fades in over 1 second, holds for 3, fades out — simple and confident" },
                                { term: "Subtitle / caption", definition: "On-screen text of spoken dialogue. Can be functional (accessibility) or stylistic (designed captions that are part of the visual identity).", prompt: "styled subtitles: bold sans-serif, slightly larger than standard, with a subtle text shadow — readable on any background, part of the visual style" },
                                { term: "Call-out / annotation", definition: "Text or graphics that point to something on screen — labeling a product feature, adding context to a scene, highlighting a detail.", prompt: "animated call-out pointing to the detail she's describing — a thin line from the text to the object, appears on her cue, clean and minimal" },
                                { term: "End screen / CTA", definition: "The final frames that direct the viewer to take action — subscribe, watch another video, visit a link. Should feel intentional, not slapped on.", prompt: "end screen: the final shot holds as two suggested video thumbnails animate in from the sides, subscribe button centered below, all over the final footage" }
                            ]}
                        ]
                    }
                ]
            },
            "marketing": {
                title: "Marketing",
                description: "Strategy, messaging, and growth mechanics",
                meta: "Domain",
                branches: [
                    {
                        name: "Strategy & Positioning",
                        categories: [
                            { name: "Market Positioning", items: [
                                { term: "Positioning", definition: "The specific place your brand occupies in people's minds relative to alternatives. Not what you do — how you're different from everyone else who does it.", prompt: "help me articulate positioning for a premium meal kit brand — who's the customer, what's the alternative they're using now, why is this better for them specifically" },
                                { term: "Target audience / ICP (Ideal Customer Profile)", definition: "A specific description of who you're marketing to — not 'everyone' but a narrow, describable person with specific needs, behaviors, and context.", prompt: "define the ICP for this productivity app — not just demographics, but what's their day-to-day frustration, what have they already tried, what would make them switch" },
                                { term: "Unique value proposition (UVP)", definition: "One clear statement of what you offer, who it's for, and why it's different. If you can't say it in one sentence, you haven't figured it out yet.", prompt: "write a UVP for a project management tool aimed at creative agencies — one sentence, covers what it does, who it's for, and the single biggest differentiator" },
                                { term: "Competitive landscape / differentiation", definition: "Understanding what alternatives exist and where you fit. Not just direct competitors — anything the customer might do instead, including nothing.", prompt: "map the competitive landscape for this coffee subscription: direct competitors, adjacent alternatives (grocery store, local roasters), and the 'do nothing' option" },
                                { term: "Category creation", definition: "Defining a new market category rather than competing in an existing one. Instead of 'we're a better CRM,' it's 'we invented revenue operations.'", prompt: "we don't fit neatly into an existing category — help me define a new one that frames our product as the obvious leader, not a follower" },
                                { term: "Brand story / origin narrative", definition: "The founding story that gives the brand meaning — why it exists, what problem the founder experienced personally, what belief drives everything.", prompt: "write a brand origin story for a skincare company — the founder's personal experience with the problem, the insight that led to the product, the mission beyond just selling things" }
                            ]},
                            { name: "Go-to-Market", items: [
                                { term: "GTM (go-to-market) strategy", definition: "The plan for how a product reaches its customers — which channels, what messaging, what sequence, at what price, to which segment first.", prompt: "outline a GTM strategy for launching a B2B SaaS tool — what's the initial target segment, which channels reach them, what's the messaging, what's the pricing and packaging" },
                                { term: "Product-led growth (PLG)", definition: "The product itself drives acquisition — free tiers, trials, self-serve onboarding. Users experience value before talking to sales.", prompt: "design a product-led growth motion: what's the free tier, what triggers the upgrade, how does the product itself create word-of-mouth" },
                                { term: "Flywheel / growth loops", definition: "A self-reinforcing cycle where each user creates conditions for more users — content creates traffic, traffic creates signups, signups create content.", prompt: "map the growth flywheel: how does each new user create the conditions for the next one — what's the loop, where's the friction, what accelerates it" }
                            ]}
                        ]
                    },
                    {
                        name: "Channels & Tactics",

                </div>
            `;
        }

        function toggleTerm(element) {
            element.closest('.term-item').classList.toggle('expanded');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Visual domains that benefit from image search links
        const visualDomains = ['ai-image-generation', 'ui-components', 'interior-design', 'fashion-design', 'cooking'];

        // Domain-specific search suffixes for better Google Image results
        const domainSearchSuffix = {
            'ai-image-generation': 'photography style',
            'ui-components': 'UI component design',
            'interior-design': 'interior design',
            'fashion-design': 'fashion style',
            'cooking': 'cooking technique food'
        };

        function generateImageUrl(term, domain) {
            const suffix = domainSearchSuffix[domain] || '';
            const query = encodeURIComponent(`${term} ${suffix}`.trim());
            return `https://www.google.com/search?tbm=isch&q=${query}`;
        }

        function renderTermItem(item, domain) {
            const isRich = typeof item === 'object';
            const term = isRich ? item.term : item;
            const hasDetails = isRich && (item.definition || item.prompt);

            // Auto-generate image URL for visual domains if not already set
            const isVisualDomain = visualDomains.includes(domain);
            const imageUrl = isRich && item.imageUrl ? item.imageUrl : (isVisualDomain ? generateImageUrl(term, domain) : null);

            if (hasDetails) {
                return `
                    <li class="term-item expandable">
                        <div class="term-header" onclick="toggleTerm(this)">
                            <span class="term-text">${escapeHtml(term)}</span>
                        </div>
                        <div class="term-details">
                            ${item.definition ? `<div class="term-definition">${escapeHtml(item.definition)}</div>` : ''}
                            ${item.prompt ? `<div class="term-prompt">${escapeHtml(item.prompt)}</div>` : ''}
                            ${imageUrl ? `<div class="term-links"><a href="${imageUrl}" target="_blank" rel="noopener" class="term-link">View examples →</a></div>` : ''}
                        </div>
                    </li>
                `;
            } else {
                // Simple term without rich data - still expandable if visual domain
                if (isVisualDomain) {
                    return `
                        <li class="term-item expandable">
                            <div class="term-header" onclick="toggleTerm(this)">
                                <span class="term-text">${escapeHtml(term)}</span>
                            </div>
                            <div class="term-details">
                                <div class="term-links"><a href="${imageUrl}" target="_blank" rel="noopener" class="term-link">View examples →</a></div>
                            </div>
                        </li>
                    `;
                } else {
                    return `
                        <li class="term-item">
                            <span class="term-text">${escapeHtml(term)}</span>
                        </li>
                    `;
                }
            }
        }

        function renderDomainPage(page) {
            const branch = page.branches[currentBranch];
            const tabsFilterRowEl = document.getElementById('tabs-filter-row');

            // Build tabs + filter row (desktop)
            const hasTabs = page.branches.length > 1;
            const tabsHtml = hasTabs ? `
                <div class="branch-tabs">
                    ${page.branches.map((b, i) => `
                        <button class="branch-tab ${i === currentBranch ? 'active' : ''}"
                            onclick="selectBranch(${i})">
                            ${b.name}
                        </button>
                    `).join('')}
                </div>
            ` : '';

            // Render tabs + filter row in separate container (desktop)
            tabsFilterRowEl.innerHTML = `
                ${tabsHtml}
                <input type="text" class="filter-input" placeholder="filter terms..." id="inline-filter">
            `;
            tabsFilterRowEl.classList.remove('hidden');

            // Render categories in content grid (desktop)
            const categories = branch.categories.map(cat => `
                <div class="category-block">
                    <div class="category-header">
                        <span>${cat.name}</span>
                        <span class="category-count">${String(cat.items.length).padStart(2, '0')}</span>
                    </div>
                    <ul class="term-list">
                        ${cat.items.map(item => renderTermItem(item, currentPage)).join('')}
                    </ul>
                </div>
            `).join('');

            // Mobile accordion - shows all branches as expandable sections
            const mobileAccordion = `
                <div class="mobile-filter">
                    <input type="text" class="filter-input" placeholder="filter terms..." id="mobile-filter-input">
                </div>
                <div class="mobile-accordion">
                    ${page.branches.map((b, i) => `
                        <div class="accordion-branch">
                            <div class="accordion-header" onclick="toggleAccordion(this)">
                                ${b.name}
                            </div>
                            <div class="accordion-content">
                                ${b.categories.map(cat => `
                                    <div class="category-block">
                                        <div class="category-header">
                                            <span>${cat.name}</span>
                                            <span class="category-count">${String(cat.items.length).padStart(2, '0')}</span>
                                        </div>
                                        <ul class="term-list">
                                            ${cat.items.map(item => renderTermItem(item, currentPage)).join('')}
                                        </ul>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            contentGrid.innerHTML = `
                <div class="desktop-categories">${categories}</div>
                ${mobileAccordion}
            `;

            // Re-bind filters
            const inlineFilter = document.getElementById('inline-filter');
            if (inlineFilter) {
                inlineFilter.addEventListener('input', handleFilter);
            }
            const mobileFilterInput = document.getElementById('mobile-filter-input');
            if (mobileFilterInput) {
                mobileFilterInput.addEventListener('input', handleFilter);
            }
        }

        function selectBranch(index) {
            if (index === currentBranch) return;

            // Fade out
            contentGrid.classList.add('fading');

            setTimeout(() => {
                currentBranch = index;
                filterInput.value = '';
                renderPage();

                // Wait for DOM to update, then fade in
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        contentGrid.classList.remove('fading');
                    });
                });
            }, 150);
        }

        function copyTerm(text) {
            navigator.clipboard.writeText(text);
            toast.textContent = `Copied "${text}"`;
            toast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        function copyPrompt() {
            const promptText = document.querySelector('.prompt-text').textContent;
            navigator.clipboard.writeText(promptText);
            toast.textContent = 'Copied prompt to clipboard';
            toast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        // Filter function (reusable)
        function handleFilter(e) {
            const query = e.target.value.toLowerCase();
            const terms = document.querySelectorAll('.term-item:not(.no-copy)');
            const categories = document.querySelectorAll('.category-block');

            terms.forEach(term => {
                // Get just the term text (first line / term header)
                const termHeader = term.querySelector('.term-header') || term.querySelector('.term-text');
                const text = termHeader ? termHeader.innerText.toLowerCase() : term.innerText.toLowerCase();
                term.classList.toggle('hidden', !text.includes(query));
                // Collapse expanded terms when filtering
                if (!text.includes(query)) {
                    term.classList.remove('expanded');
                }
            });

            categories.forEach(category => {
                const visibleTerms = category.querySelectorAll('.term-item:not(.hidden):not(.no-copy)');
                const hasNoCopyItems = category.querySelectorAll('.term-item.no-copy').length > 0;
                if (!hasNoCopyItems) {
                    category.classList.toggle('hidden', visibleTerms.length === 0);
                }
            });
        }

        // Bind to original filter input (fallback)
        filterInput.addEventListener('input', handleFilter);

        // Mobile sidebar toggle
        const hamburgerBtn = document.getElementById('hamburger-btn');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const isOpen = sidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('visible');
            hamburgerBtn.style.display = isOpen ? 'none' : 'block';
        }

        hamburgerBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // Mobile accordion toggle
        function toggleAccordion(header) {
            const branch = header.closest('.accordion-branch');
            branch.classList.toggle('expanded');
        }

        // Init
        window.addEventListener('hashchange', handleRoute);
        handleRoute();
    </script>

</body>
</html>
