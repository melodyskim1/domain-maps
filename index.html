<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F2F0;
            --text-primary: #111111;
            --text-secondary: #777777;
            --text-tertiary: #AAAAAA;
            --font-stack: 'IBM Plex Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
            --font-size-base: 13px;
            --line-height-base: 1.5;
            --spacing-unit: 24px;
            --indent: 2ch;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::selection {
            background: #000;
            color: #fff;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-unit);
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            right: 0;
            top: var(--spacing-unit);
            bottom: var(--spacing-unit);
            width: 1px;
            background: rgba(0,0,0,0.06);
        }

        .main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: var(--spacing-unit) 48px;
            display: flex;
            flex-direction: column;
        }

        /* Brand */
        .brand {
            font-weight: 500;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
        }

        .brand svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Navigation */
        .nav-section {
            margin-bottom: 32px;
        }

        .nav-header {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            display: block;
            padding: 4px 0;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s ease, padding 0.2s ease;
            position: relative;
            padding-left: 0;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-item.active {
            color: var(--text-primary);
            font-weight: 500;
            padding-left: var(--indent);
        }

        .nav-item.active::before {
            content: '\2192';
            position: absolute;
            left: 0;
            font-size: 10px;
            top: 6px;
        }

        /* Header */
        .page-header {
            margin-bottom: 48px;
            max-width: 800px;
        }

        .page-meta {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 11px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .page-desc {
            color: var(--text-secondary);
            max-width: 500px;
        }

        /* Filter */
        .filter-container {
            margin-bottom: 32px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding-bottom: 16px;
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .filter-input {
            width: 100%;
            background: transparent;
            border: none;
            font-family: var(--font-stack);
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            padding: 8px 0;
        }

        .filter-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Grid */
        .content-grid {
            column-count: 3;
            column-gap: 48px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 1200px) {
            .content-grid { column-count: 2; }
        }

        @media (max-width: 900px) {
            .content-grid { column-count: 1; }
        }

        /* Category blocks */
        .category-block {
            break-inside: avoid;
            margin-bottom: 48px;
        }

        .category-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
        }

        .category-count {
            color: var(--text-tertiary);
        }

        .term-list {
            list-style: none;
        }

        .term-item {
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            transition: opacity 0.2s;
        }

        .term-item:hover {
            opacity: 1 !important;
        }

        .term-list:hover .term-item {
            opacity: 0.4;
        }

        .term-item.no-copy {
            cursor: default;
        }

        .term-item.no-copy:hover {
            opacity: 1;
        }

        .term-list:hover .term-item.no-copy {
            opacity: 1;
        }

        .term-text {
            position: relative;
            padding-right: 8px;
        }

        .term-item:not(.no-copy) .term-text::after {
            content: '+';
            position: absolute;
            right: -10px;
            opacity: 0;
            font-size: 10px;
            transition: opacity 0.1s;
        }

        .term-item:not(.no-copy):hover .term-text::after {
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--text-primary);
            color: var(--bg-color);
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 2px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
            <span>DOMAIN MAPS</span>
        </div>

        <nav class="nav-section">
            <ul class="nav-list" id="nav-list"></ul>
        </nav>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <div class="page-meta" id="page-meta"></div>
            <h1 class="page-title" id="page-title"></h1>
            <div class="page-desc" id="page-desc"></div>
        </div>

        <div class="filter-container">
            <input type="text" class="filter-input" placeholder="filter terms..." id="filter-input">
        </div>

        <div class="content-grid" id="content-grid"></div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>

                            { name: "Editing Rhythm", items: ["Jump cut", "J-cut / L-cut", "Match cut", "Smash cut", "Cross dissolve", "Montage sequence", "Long take", "Parallel editing", "Cutaway", "Insert shot"] },

                    {

                        categories: [
                            { name: "Silhouettes", items: ["Low-slung/ground-hugging", "Leggy/elevated", "Sculptural/organic", "Boxy/geometric", "Rounded/soft", "Cantilevered", "Modular/sectional", "Statement scale (oversized)", "Slim profile", "Mixed era pairing"] },
                            { name: "Styling & Objects", items: ["Coffee table books", "Ceramics/pottery", "Dried botanicals", "Sculptural objects", "Vintage/found pieces", "Trays for grouping", "Mirrors (placement/shape)", "Artwork leaning vs. hung", "Rug layering", "Personal artifacts"] }
                        ]
                    }
                ]
            },
            "fashion-design": {

                meta: "Domain / 03",
                branches: [
                    {

                        categories: [

                    },
                    {
                        name: "Construction & Detail",
                        categories: [
                            { name: "Construction Methods", items: ["Tailored/structured", "Draped", "Pleated (knife, box, accordion)", "Gathered/ruched", "Smocked", "Quilted", "Bias cut", "Raw edge/unfinished", "Bonded/laminated", "Zero-waste/pattern-cut"] },
                            { name: "Detail Elements", items: ["Darts", "Pintucks", "Piping/contrast trim", "Topstitching", "Button placket", "Collar type (mandarin, notch, shawl, peter pan)", "Cuff style", "Pocket type (patch, welt, hidden)", "Closure (zipper, snap, hook, tie)", "Lining (full, partial, contrast)"] }

                            { name: "Surface Treatment", items: ["Print (floral, geometric, abstract, toile)", "Embroidery", "Beading/sequin", "Applique", "Dyeing (tie-dye, ombre, dip-dye)", "Distressing/washing", "Coating/waxing", "Laser cut", "Burnout/devore", "Patchwork"] }
                        ]
                    },
                    {
                        name: "Styling & Context",
                        categories: [
                            { name: "Style Languages", items: ["Minimalist", "Maximalist", "Streetwear", "Avant-garde", "Classic/preppy", "Romantic/feminine", "Utilitarian/workwear", "Bohemian", "Athleisure", "Quiet luxury"] },
                            { name: "Styling Moves", items: ["Tonal dressing", "Contrast pairing", "Texture mixing", "Unexpected proportions", "One statement piece", "Accessory anchoring", "Visible layering", "Undone/effortless detail", "Color blocking", "Pattern mixing (scale variety)"] }
                        ]
                    }
                ]
            },
            "cooking": {
                title: "Cooking",
                description: "Technique, flavor, and the craft of food",
                meta: "Domain / 04",
                branches: [
                    {
                        name: "Heat & Technique",
                        categories: [
                            { name: "Dry Heat Methods", items: ["Sear/pan-fry", "Saute", "Roast", "Broil/grill", "Deep fry", "Stir-fry (wok hei)", "Bake", "Toast/char", "Smoke (hot/cold)", "Flambe"] },
                            { name: "Wet/Gentle Methods", items: ["Braise", "Stew", "Poach", "Steam", "Blanch + shock", "Sous vide", "Simmer/reduce", "Confit", "Bain-marie", "Pressure cook"] },
                            { name: "No-Heat Techniques", items: ["Ceviche/acid cook", "Curing (salt, sugar)", "Fermentation", "Marination", "Pickling", "Cold smoking", "Dehydrating", "Freezing for texture", "Infusing", "Emulsifying"] }
                        ]
                    },
                    {
                        name: "Flavor Architecture",

                            { name: "Flavor Layering", items: ["Base aromatics (mirepoix, sofrito, trinity)", "Spice blooming (toasting in fat)", "Deglazing (fond = flavor)", "Building in stages (not all at once)", "Finishing flavors (raw garlic, fresh herbs, acid)", "Compound butter/flavored oil", "Condiment as accent", "Contrasting garnish", "Sauce reduction", "Infused liquids (stock, cream, oil)"] }

                    },
                    {
                        name: "Texture & Composition",
                        categories: [
                            { name: "Texture Contrasts", items: ["Crispy/crunchy", "Creamy/smooth", "Chewy", "Snappy (casing, fresh veg)", "Flaky/shatteringly tender", "Silky (emulsion, custard)", "Airy/mousse-like", "Gelatinous", "Grainy (couscous, breadcrumb)", "Juicy/succulent"] },
                            { name: "Plating & Composition", items: ["Height/architecture", "Negative space", "Odd numbers", "Color contrast", "Sauce placement (under, drizzle, dots)", "Microgreens/herb placement", "Temperature contrast (warm/cold on same plate)", "Vessel choice", "Portion scaling", "Garnish with purpose (edible, relevant)"] }
                        ]
                    },
                    {
                        name: "Culinary Traditions",
                        categories: [
                            { name: "Foundational Cuisines", items: ["French (mother sauces, technique)", "Italian (simplicity, ingredient quality)", "Japanese (umami, precision, seasonality)", "Chinese (wok technique, regional diversity)", "Mexican (chili complexity, corn, layering)", "Indian (spice building, regional variation)", "Thai (balance of 4 tastes)", "Middle Eastern (spice, grain, herb)", "Korean (fermentation, banchan)", "West African (stews, grains, bold spice)"] },
                            { name: "Cross-Cutting Concepts", items: ["Mise en place", "Seasoning in layers", "Resting meat", "Maillard reaction (browning)", "Emulsification", "Starch as thickener", "Acid to finish", "Carry-over cooking", "Bloom spices in fat", "Taste as you go"] }
                        ]
                    }
                ]
            }
        };

        const navOrder = ["home", "content-creation", "interior-design", "fashion-design", "cooking"];
        const navLabels = {
            "home": "Home",
            "content-creation": "Content Creation",
            "interior-design": "Interior Design",
            "fashion-design": "Fashion Design",
            "cooking": "Cooking"
        };

        // State
        let currentPage = "home";
        let currentBranch = 0;

        // DOM
        const navList = document.getElementById('nav-list');
        const pageMeta = document.getElementById('page-meta');
        const pageTitle = document.getElementById('page-title');
        const pageDesc = document.getElementById('page-desc');
        const contentGrid = document.getElementById('content-grid');
        const filterInput = document.getElementById('filter-input');
        const toast = document.getElementById('toast');

        let toastTimeout;

        // Router
        function getRoute() {
            const hash = window.location.hash.slice(1) || '/';
            const route = hash.startsWith('/') ? hash.slice(1) : hash;
            return route || 'home';
        }

        function navigate(page) {
            window.location.hash = page === 'home' ? '/' : '/' + page;
        }

        function handleRoute() {
            const route = getRoute();
            if (pages[route]) {
                currentPage = route;
                currentBranch = 0;
                filterInput.value = '';
                render();
            }
        }

        // Render
        function render() {
            renderNav();
            renderPage();
        }

        function renderNav() {
            navList.innerHTML = navOrder.map(key => `
                <li class="nav-item ${key === currentPage ? 'active' : ''}"
                    onclick="navigate('${key}')">${navLabels[key]}</li>
            `).join('');
        }

        function renderPage() {
            const page = pages[currentPage];

            pageMeta.textContent = page.meta;
            pageTitle.textContent = page.title;
            pageDesc.textContent = page.description;

            // Check if page has branches (domain) or just categories (home)
            if (page.branches) {
                renderDomainPage(page);
            } else {
                renderHomePage(page);
            }
        }

        function renderHomePage(page) {
            contentGrid.innerHTML = page.categories.map(cat => `
                <div class="category-block">
                    <div class="category-header">
                        <span>${cat.name}</span>
                        <span class="category-count">${String(cat.items.length).padStart(2, '0')}</span>
                    </div>
                    <ul class="term-list">
                        ${cat.items.map(item => `
                            <li class="term-item no-copy">
                                <span class="term-text">${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function renderDomainPage(page) {
            const branch = page.branches[currentBranch];

            // Add branch tabs if multiple branches
            let branchTabs = '';
            if (page.branches.length > 1) {
                branchTabs = `
                    <div class="category-block" style="margin-bottom: 32px;">
                        <div class="category-header">
                            <span>Branches</span>
                        </div>
                        <ul class="term-list" style="display: flex; gap: 16px; flex-wrap: wrap;">
                            ${page.branches.map((b, i) => `
                                <li class="term-item no-copy"
                                    onclick="selectBranch(${i})"
                                    style="cursor: pointer; ${i === currentBranch ? 'font-weight: 500;' : 'color: var(--text-secondary);'}">
                                    <span class="term-text">${b.name}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            const categories = branch.categories.map(cat => `
                <div class="category-block">
                    <div class="category-header">
                        <span>${cat.name}</span>
                        <span class="category-count">${String(cat.items.length).padStart(2, '0')}</span>
                    </div>
                    <ul class="term-list">
                        ${cat.items.map(item => `
                            <li class="term-item" onclick="copyTerm('${item.replace(/'/g, "\\'")}')">
                                <span class="term-text">${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');

            contentGrid.innerHTML = branchTabs + categories;
        }

        function selectBranch(index) {
            currentBranch = index;
            filterInput.value = '';
            renderPage();
        }

        function copyTerm(text) {
            navigator.clipboard.writeText(text);
            toast.textContent = `Copied "${text}"`;
            toast.classList.add('visible');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => toast.classList.remove('visible'), 2000);
        }

        // Filter
        filterInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const terms = document.querySelectorAll('.term-item:not(.no-copy)');
            const categories = document.querySelectorAll('.category-block');

            terms.forEach(term => {
                const text = term.innerText.toLowerCase();
                term.classList.toggle('hidden', !text.includes(query));
            });

            categories.forEach(category => {
                const visibleTerms = category.querySelectorAll('.term-item:not(.hidden):not(.no-copy)');
                const hasNoCopyItems = category.querySelectorAll('.term-item.no-copy').length > 0;
                if (!hasNoCopyItems) {
                    category.classList.toggle('hidden', visibleTerms.length === 0);
                }
            });
        });

        // Init
        window.addEventListener('hashchange', handleRoute);
        handleRoute();
    </script>

</body>
</html>
