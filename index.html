<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F2F0;
            --text-primary: #111111;
            --text-secondary: #555555;
            --text-tertiary: #888888;
            --font-stack: 'IBM Plex Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
            --font-size-base: 15px;
            --line-height-base: 1.5;
            --spacing-unit: 24px;
            --indent: 2ch;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::selection {
            background: #000;
            color: #fff;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-unit);
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            right: 0;
            top: var(--spacing-unit);
            bottom: var(--spacing-unit);
            width: 1px;
            background: rgba(0,0,0,0.06);
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 24px;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .sidebar-footer-link {
            font-size: 14px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .sidebar-footer-link:hover {
            color: var(--text-primary);
        }

        .main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: var(--spacing-unit) 48px;
            display: flex;
            flex-direction: column;
        }

        /* Brand */
        .brand {
            font-weight: 500;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
        }

        .brand svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Navigation */
        .nav-section {
            margin-bottom: 32px;
        }

        .nav-header {
            color: var(--text-secondary);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .nav-list {
            list-style: none;
        }

        .nav-group {
            margin-bottom: 8px;
        }

        .nav-group-header {
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            transition: color 0.15s ease;
        }

        .nav-group-header:hover {
            color: var(--text-secondary);
        }

        .nav-group-arrow {
            font-size: 14px;
            transition: transform 0.2s ease;
        }

        .nav-group.expanded .nav-group-arrow {
            transform: rotate(90deg);
        }

        .nav-group-items {
            list-style: none;
            padding-left: 0;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.2s ease;
        }

        .nav-group.expanded .nav-group-items {
            max-height: 500px;
            margin-bottom: 12px;
        }

        .nav-item {
            display: block;
            padding: 4px 0;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s ease, padding 0.2s ease;
            position: relative;
            padding-left: 0;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-item.active {
            color: var(--text-primary);
            font-weight: 500;
            padding-left: var(--indent);
        }

        .nav-item.active::before {
            content: '\2192';
            position: absolute;
            left: 0;
            font-size: 12px;
            top: 6px;
        }

        /* Header */
        .page-header {
            margin-bottom: 48px;
            max-width: 800px;
        }

        .page-meta {
            color: var(--text-tertiary);
            margin-bottom: 24px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .breadcrumb-link {
            cursor: pointer;
            transition: color 0.15s ease;
        }

        .breadcrumb-link:hover {
            color: var(--text-primary);
        }

        .page-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 16px;
        }

        .page-desc {
            color: var(--text-secondary);
            max-width: 500px;
        }

        /* Filter */
        .filter-container {
            margin-bottom: 32px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding-bottom: 16px;
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .filter-input {
            width: 100%;
            background: transparent;
            border: none;
            font-family: var(--font-stack);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            padding: 8px 0;
        }

        .filter-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Grid */
        .content-grid {
            column-count: 3;
            column-gap: 48px;
            width: 100%;
            max-width: 1200px;
            transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content-grid.fading {
            opacity: 0;
            transition: opacity 0.15s cubic-bezier(0.4, 0, 1, 1);
        }

        @media (max-width: 1200px) {
            .content-grid { column-count: 2; }
        }

        @media (max-width: 900px) {
            .content-grid { column-count: 1; }
        }

        /* Category blocks */
        .category-block {
            break-inside: avoid;
            margin-bottom: 48px;
        }

        .category-header {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
        }

        .category-count {
            color: var(--text-tertiary);
        }

        .term-list {
            list-style: none;
        }

        .term-item {
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            transition: opacity 0.2s;
        }

        .term-item:hover {
            opacity: 1 !important;
        }

        .term-list:hover .term-item {
            opacity: 0.4;
        }

        .term-item.no-copy {
            cursor: default;
        }

        .term-item.no-copy:hover {
            opacity: 1;
        }

        .term-list:hover .term-item.no-copy {
            opacity: 1;
        }

        .term-text {
            position: relative;
            padding-right: 8px;
        }

        .term-item:not(.no-copy) .term-text::after {
            content: '+';
            position: absolute;
            right: -10px;
            opacity: 0;
            font-size: 12px;
            transition: opacity 0.1s;
        }

        .term-item:not(.no-copy):hover .term-text::after {
            opacity: 0.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--text-primary);
            color: var(--bg-color);
            padding: 8px 16px;
            font-size: 14px;
            border-radius: 2px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        .hidden { display: none !important; }

        /* Expandable terms */
        .term-item.expandable {
            flex-direction: column;
            align-items: flex-start;
        }

        .term-header {
            display: flex;
            align-items: baseline;
            cursor: pointer;
            width: 100%;
        }

        .term-details {
            max-height: 0;
            overflow: hidden;
            padding: 0 0 0 16px;
            border-left: 1px solid transparent;
            margin: 0 0 0 4px;
            width: 100%;
            opacity: 0;
            transition: max-height 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.15s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        margin 0.2s cubic-bezier(0.4, 0, 0.2, 1),
                        border-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .term-item.expanded .term-details {
            max-height: 300px;
            opacity: 1;
            padding: 8px 0 16px 16px;
            margin: 8px 0 8px 4px;
            border-left-color: rgba(0,0,0,0.1);
        }

        .term-definition {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.5;
        }

        .term-prompt {
            font-style: italic;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
            line-height: 1.5;
        }

        .term-prompt::before {
            content: '"';
        }

        .term-prompt::after {
            content: '"';
        }

        .term-links {
            display: flex;
            gap: 12px;
            font-size: 13px;
        }

        .term-link {
            color: var(--text-tertiary);
            text-decoration: none;
        }

        .term-link:hover {
            color: var(--text-primary);
        }

        /* Home page styles */
        .content-grid.home-layout {
            column-count: 1;
            padding-top: 56px;
        }

        .home-header {
            margin-bottom: 48px;
        }

        .home-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .home-subtitle {
            font-size: 17px;
            color: var(--text-secondary);
            margin-top: 8px;
            max-width: 680px;
            line-height: 1.5;
        }

        .home-domains-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 48px;
        }

        @media (max-width: 900px) {
            .home-domains-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .home-domains-grid {
                grid-template-columns: 1fr;
            }
        }

        .home-domain-list {
            list-style: none;
        }

        .home-domain-item {
            margin-bottom: 6px;
        }

        .home-domain-link {
            color: var(--text-primary);
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .home-domain-link:hover {
            opacity: 0.5;
        }

        .filter-container.hidden {
            display: none;
        }

        /* Static content pages */
        .content-grid.static-layout {
            column-count: 1;
            max-width: 640px;
        }

        .static-content {
            max-width: 640px;
        }

        .static-intro {
            color: var(--text-secondary);
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .static-heading {
            font-size: 15px;
            font-weight: 500;
            margin-top: 32px;
            margin-bottom: 16px;
        }

        .static-text {
            color: var(--text-secondary);
            margin-bottom: 16px;
            line-height: 1.6;
        }

        .static-list {
            list-style: none;
            color: var(--text-secondary);
        }

        .static-list li {
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .static-list strong {
            color: var(--text-primary);
        }

        .prompt-block {
            background: rgba(0,0,0,0.03);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 24px;
            position: relative;
        }

        .prompt-text {
            font-family: var(--font-stack);
            font-size: 13px;
            line-height: 1.6;
            color: var(--text-secondary);
            white-space: pre-wrap;
            margin: 0;
        }

        .copy-prompt-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 6px 12px;
            font-family: var(--font-stack);
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .copy-prompt-btn:hover {
            opacity: 0.8;
        }

        .contact-links {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .contact-link {
            color: var(--text-primary);
            text-decoration: none;
            border-bottom: 1px solid var(--text-tertiary);
            transition: border-color 0.15s ease;
        }

        .contact-link:hover {
            border-color: var(--text-primary);
        }

        .contact-divider {
            color: var(--text-tertiary);
        }

        /* Branch tabs + filter row */
        .tabs-filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            padding-bottom: 12px;
            max-width: 1200px;
            position: relative;
        }

        .tabs-filter-row.hidden {
            display: none;
        }

        .branch-tabs {
            display: flex;
            gap: 24px;
        }

        .tabs-filter-row .filter-input {
            width: 140px;
            text-align: right;
            background: transparent;
            border: none;
            font-family: var(--font-stack);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
        }

        .tabs-filter-row .filter-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        .branch-tab {
            background: none;
            border: none;
            font-family: var(--font-stack);
            font-size: 15px;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            transition: color 0.15s ease;
        }

        .branch-tab:hover {
            color: var(--text-primary);
        }

        .branch-tab.active {
            color: var(--text-primary);
            font-weight: 500;
            position: relative;
        }

        .branch-tab.active::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: -13px;
            height: 2px;
            background: var(--text-primary);
        }

        /* Mobile hamburger menu */
        .hamburger-btn {
            display: none;
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1001;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger-btn span {
            display: block;
            width: 20px;
            height: 2px;
            background: var(--text-primary);
            margin: 4px 0;
            transition: transform 0.3s;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 999;
        }

        .sidebar-overlay.visible {
            display: block;
        }

        /* Mobile accordion */
        .mobile-filter {
            display: none;
            margin-bottom: 24px;
        }

        .mobile-filter .filter-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            font-family: var(--font-stack);
            font-size: 15px;
            color: var(--text-primary);
            outline: none;
            padding: 8px 0;
        }

        .mobile-accordion {
            display: none;
        }

        .accordion-branch {
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .accordion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            cursor: pointer;
            font-weight: 500;
        }

        .accordion-header::after {
            content: '+';
            font-size: 18px;
            color: var(--text-tertiary);
        }

        .accordion-branch.expanded .accordion-header::after {
            content: '−';
        }

        .accordion-content {
            display: none;
            padding-bottom: 24px;
        }

        .accordion-branch.expanded .accordion-content {
            display: block;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .hamburger-btn {
                display: block;
            }

            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100%;
                z-index: 1000;
                background: var(--bg-color);
                transition: left 0.3s ease;
                width: 260px;
            }

            .sidebar.open {
                left: 0;
            }

            .main-content {
                padding: 24px;
                padding-top: 64px;
            }

            .page-title {
                font-size: 16px;
            }

            .page-header {
                margin-bottom: 24px;
            }

            .home-title {
                font-size: 16px;
            }

            .content-grid {
                column-count: 1;
            }

            .content-grid.home-layout {
                padding-top: 0;
            }

            .home-domains-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .category-block {
                margin-bottom: 24px;
            }

            /* Hide desktop tabs, show mobile accordion */
            .tabs-filter-row {
                display: none !important;
            }

            .desktop-categories {
                display: none;
            }

            .mobile-filter {
                display: block;
            }

            .mobile-accordion {
                display: block;
            }
        }

    </style>
</head>
<body>

    <button class="hamburger-btn" id="hamburger-btn">
        <span></span><span></span><span></span>
    </button>

    <aside class="sidebar">
        <div class="brand" onclick="navigate('home')" style="cursor: pointer;">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
            <span>DOMAIN MAPS</span>
        </div>

        <nav class="nav-section">
            <ul class="nav-list" id="nav-list"></ul>
        </nav>

        <div class="sidebar-footer">
            <div class="sidebar-footer-link" onclick="navigate('make-your-own')">
                + Make Your Own
            </div>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="main-content">
        <div class="page-header">
            <div class="page-meta" id="page-meta"></div>
            <h1 class="page-title" id="page-title"></h1>
            <div class="page-desc" id="page-desc"></div>
        </div>

        <div class="filter-container">
            <input type="text" class="filter-input" placeholder="filter terms..." id="filter-input">
        </div>

        <div class="tabs-filter-row hidden" id="tabs-filter-row"></div>

        <div class="content-grid" id="content-grid"></div>
    </main>

    <div class="toast" id="toast">Copied to clipboard</div>

    <script>
        // Pages data
        const pages = {
            "home": {
                title: "Domain Maps",
                subtitle: "Essential terminology to help improve how you prompt AI.",
                domainGroups: [
                    {
                        name: "Design",
                        domains: [
                            { slug: "visual-design", label: "Visual Design & Layout" },
                            { slug: "typography", label: "Typography" },
                            { slug: "ui-components", label: "UI Components" },
                            { slug: "interaction-motion", label: "Interaction & Motion" }
                        ]
                    },
                    {
                        name: "Create",
                        domains: [
                            { slug: "ai-image-generation", label: "AI Image Generation" },
                            { slug: "motion-graphics", label: "Motion Graphics" },
                            { slug: "3d-modeling", label: "3D Modeling" },
                            { slug: "sound-design", label: "Sound Design" },
                            { slug: "film-video-editing", label: "Film / Video Editing" },
                            { slug: "game-design", label: "Game Design" }
                        ]
                    },
                    {
                        name: "Communicate",
                        domains: [
                            { slug: "copy-content", label: "Copy & Content" },
                            { slug: "marketing", label: "Marketing" },
                            { slug: "data-visualization", label: "Data Visualization" }
                        ]
                    },
                    {
                        name: "Explore",
                        domains: [
                            { slug: "interior-design", label: "Interior Design" },
                            { slug: "fashion-design", label: "Fashion Design" },
                            { slug: "cooking", label: "Cooking" },
                            { slug: "creative-writing", label: "Creative Writing" }
                        ]
                    }
                ]
            },
            "content-creation": {
                title: "Content Creation",
                description: "Video, writing, and multimedia storytelling",
                meta: "Domain / 01",
                branches: [
                    {
                        name: "Video",
                        categories: [
                            { name: "Shot Types", items: [
                                { term: "Wide/establishing", definition: "Shows the full environment and context. Sets location, mood, and scale before cutting closer.", prompt: "open with a wide establishing shot of the café interior, showing all the tables and the baristas at work" },
                                { term: "Medium", definition: "Subject from roughly waist up. Balances the person with their environment, good for dialogue.", prompt: "cut to a medium shot of the host explaining the concept, visible from the waist up with the studio behind them" },
                                { term: "Close-up", definition: "Tight on face or single object. Creates intimacy, shows emotion, draws attention.", prompt: "when they react to the news, cut to a close-up of their face to capture the emotion" },
                                { term: "Extreme close-up", definition: "Very tight — an eye, hands, a detail. Creates intensity or highlights important details.", prompt: "extreme close-up of their hands as they thread the needle, showing the precision" },
                                { term: "Over-the-shoulder", definition: "Camera behind one person looking at another. Creates connection between subjects in conversation.", prompt: "film the interview as over-the-shoulder shots, alternating between both speakers" },
                                { term: "POV", definition: "Camera shows what the subject sees. Makes the viewer feel like they're the character.", prompt: "POV shot walking through the market, camera at eye level, looking at the stalls" },
                                { term: "Aerial/drone", definition: "High overhead shot, often moving. Shows scale, reveals landscape, creates epic feeling.", prompt: "open with a drone shot slowly rising over the mountain ridge at sunrise" },
                                { term: "Dutch angle", definition: "Camera tilted so horizon is diagonal. Creates unease, tension, or stylized energy.", prompt: "use a Dutch angle when the tension peaks to make the scene feel unsettling" },
                                { term: "Tracking shot", definition: "Camera moves alongside or follows the subject. Creates energy and keeps the viewer engaged.", prompt: "tracking shot following them as they walk down the street, camera moving with them" },

                                { term: "Display / decorative", definition: "Fonts designed for large sizes — headlines, posters, logos. Too distinctive for body text but powerful as a statement.", prompt: "bold display font for the hero headline — something with personality like Instrument Serif, used only at large scale" },

                                { term: "Font pairing", definition: "Combining two fonts that complement each other — usually display for headings with readable for body. Contrast is key.", prompt: "pair a bold serif display font for headings with a clean sans-serif for body text — contrast creates hierarchy" },
                                { term: "Type scale / hierarchy", definition: "A system of font sizes that creates clear visual ranking — biggest (most important) to smallest (least).", prompt: "establish a type scale: H1 at 48px, H2 at 32px, H3 at 24px, body at 16px, caption at 14px" },
                                { term: "Line height / leading", definition: "The vertical space between lines of text. Body text usually needs 1.5-1.7x the font size.", prompt: "increase the line height on the body text to 1.6 — it's too tight, the lines are running together" },

                                { term: "Weight contrast", definition: "Using different font weights (light, regular, bold) to create hierarchy within the same typeface.", prompt: "use weight contrast instead of different fonts — thin for labels, regular for body, bold for headings" }

                    {

                            { name: "Color Systems", items: [
                                { term: "Primary palette", definition: "The 1-3 core colors that define the brand. Used most frequently — buttons, headers, key UI elements.", prompt: "establish a primary palette of 2 colors — deep navy for trust and warm coral for energy — navy for 80%, coral for CTAs" },
                                { term: "Neutral palette", definition: "The grays, whites, and near-whites that make up most of the interface — backgrounds, borders, body text.", prompt: "build a neutral palette with warm undertones — not pure gray but slightly warm, from #FAF9F7 to #1A1A18" },
                                { term: "Semantic colors", definition: "Colors with assigned meaning — green for success, red for error, yellow for warning. Users expect these.", prompt: "set up semantic colors: green for success, red for errors, amber for warnings, blue for info" },
                                { term: "Color tokens", definition: "Named, reusable color values stored as variables. Makes theming and consistency possible.", prompt: "set up CSS color variables: --color-primary, --color-surface, --color-text — reference these everywhere" },
                                { term: "Contrast ratio", definition: "The measurable difference between text and background. WCAG requires 4.5:1 for normal text.", prompt: "check that all text colors meet WCAG AA contrast ratios — 4.5:1 for body text, 3:1 for large text" },
                                { term: "Dark mode", definition: "Light text on dark backgrounds. Use dark grays for surface elevation, not just inverting black and white.", prompt: "design dark mode — use dark grays (#1A1A1A, #2A2A2A, #3A3A3A) for surface elevation instead of pure black" }
                            ]},
                            { name: "Color Application", items: [
                                { term: "60-30-10 rule", definition: "A classic distribution: 60% dominant (neutral), 30% secondary, 10% accent. Prevents visual chaos.", prompt: "apply 60-30-10 — 60% white surfaces, 30% navy for headers and sidebars, 10% coral for buttons" },
                                { term: "Color as signifier", definition: "Using color to communicate meaning — status indicators, category labels, priority levels.", prompt: "assign distinct colors to each status: blue for In Progress, green for Complete, gray for On Hold, red for Blocked" },
                                { term: "Tint / shade generation", definition: "Creating lighter (tints) and darker (shades) versions of a base color for hover states and depth.", prompt: "generate a 9-step scale for the primary blue — from very light (backgrounds) to very dark (text)" }
                            ]}

                    {

                                { term: "Grid system", definition: "A structured framework of columns and gutters that aligns content. 12-column grids are the most flexible.", prompt: "use a 12-column grid with 24px gutters — content area is 1200px max-width, centered" },
                                { term: "Flexbox", definition: "CSS layout for arranging items in a row or column with flexible sizing. Best for one-dimensional layouts.", prompt: "use flexbox to arrange the filter buttons in a horizontal row that wraps on smaller screens" },
                                { term: "CSS Grid", definition: "CSS layout for two-dimensional layouts — rows AND columns. Best for page layouts and dashboards.", prompt: "use CSS Grid for the dashboard — sidebar on left, main content with 3-column card grid, header spanning full width" },

                            ]},

                                { term: "Spacing scale", definition: "A consistent set of spacing values — 4px, 8px, 16px, 24px, 32px, 48px. Based on a base unit.", prompt: "use an 8px spacing scale for all padding and margins — 8, 16, 24, 32, 48, 64 — no arbitrary values" },

                    {

                        categories: [
                            { name: "Hierarchy Techniques", items: [
                                { term: "Size hierarchy", definition: "Bigger = more important. Headlines are big, body is medium, captions are small.", prompt: "create clear size hierarchy — metric number should be largest on the card, label smaller, trend indicator smallest" },
                                { term: "Weight hierarchy", definition: "Bolder = more important, within the same size. Bold label next to regular body creates emphasis.", prompt: "use font weight to differentiate — bold for name, regular for description, light for timestamp" },
                                { term: "Color hierarchy", definition: "Stronger/darker color = more important. Primary text is near-black, secondary is gray, tertiary is light gray.", prompt: "three levels of text color: primary in #1A1A1A, secondary in #6B6B6B, disabled in #ABABAB" },
                                { term: "Spatial hierarchy", definition: "Things closer together are related; farther apart are separate. Grouping through proximity is effective.", prompt: "group label and input closer together (8px) and increase space between form fields (24px)" },
                                { term: "Z-index / layering", definition: "Elements stacked on top of each other — page, sticky header, dropdown, modal, toast.", prompt: "establish z-index scale: page at 0, sticky header at 100, dropdowns at 200, modals at 300, toasts at 400" }

                                { term: "Border radius", definition: "Roundness of corners. Sharp (0px) = rigid. Slightly rounded (4-8px) = modern. Fully rounded = soft.", prompt: "use consistent 8px border radius on cards and buttons, 4px on inputs, full rounding on avatars" },
                                { term: "Shadow / elevation", definition: "Shadows beneath elements suggest floating. More shadow = higher elevation. Creates depth.", prompt: "subtle shadows for elevation — cards get light shadow, dropdowns medium, modals strong with backdrop" },

                    {

                            { name: "Timing & Easing", items: [
                                { term: "Duration", definition: "How long an animation takes. Too fast (<100ms) feels jarring. Too slow (>500ms) feels sluggish. 150-300ms is typical.", prompt: "button hover transition should be 200ms — fast enough to feel responsive, slow enough to perceive" },
                                { term: "Ease-out", definition: "Starts fast, slows at end. Most natural for elements entering or arriving. Like a ball rolling to a stop.", prompt: "use ease-out for the dropdown appearing — enters quickly and settles into place, feels like it has weight", hasImages: true, imageQuery: "easing+curves+animation+ease+out+ease+in" },
                                { term: "Ease-in", definition: "Starts slow, speeds up. Best for elements leaving or exiting — they gather momentum as they go.", prompt: "use ease-in for the modal closing — starts slow and accelerates out of view, like being pulled away" },
                                { term: "Ease-in-out", definition: "Slow start, fast middle, slow end. Smooth and natural for elements moving between positions.", prompt: "use ease-in-out for the sidebar expanding — eases into motion and eases to a stop, balanced" },
                                { term: "Linear", definition: "Constant speed throughout. Feels mechanical. Rarely right for UI, but good for progress bars.", prompt: "use linear easing only for the progress bar fill — constant speed communicates steady progress" },

                            ]},
                            { name: "Animation Properties", items: [

                                { term: "Transform: translate", definition: "Moving an element from one position to another. Slide from side, drop from above, rise from below.", prompt: "slide the toast notification in from bottom right — translateY from 20px below to 0" },

                                { term: "Transform: rotate", definition: "Spinning an element. Useful for loading indicators, chevron toggles (pointing down → up).", prompt: "rotate the chevron icon 180 degrees when accordion opens — smooth rotation over 200ms" },
                                { term: "Height / max-height", definition: "Animating height to reveal or hide content. Use max-height since height:auto can't be animated.", prompt: "animate accordion content expanding — use max-height transition so content smoothly reveals" }
                            ]}

                                { term: "Focus state", definition: "Visible indicator when element is keyboard-selected. Critical for accessibility. Usually a colored ring.", prompt: "visible focus ring on all interactive elements — 2px solid primary blue outline with 2px offset" },
                                { term: "Loading feedback", definition: "Visual indication something is happening — spinner in button, skeleton screen, progress indicator.", prompt: "when user clicks Submit, button shows spinner with 'Processing...' — don't leave them wondering" },

                                { term: "Hero entrance", definition: "Choreographed entrance for main content — headline slides, then subheadline, then CTA. Guides the eye.", prompt: "on load: headline slides in (0ms), subheadline fades (150ms), CTA scales in (300ms), hero image fades (400ms)" }

                                { term: "Parallax", definition: "Background and foreground scroll at different speeds, creating depth. Subtle = elegant, overdone = nauseating.", prompt: "subtle parallax on hero image — background moves at 50% of scroll speed, gentle depth" },
                                { term: "Sticky / pinned", definition: "Elements scroll normally then stick to position when reached. Navigation bars, headers, sidebars.", prompt: "table header row becomes sticky when scrolled past — stays fixed so column labels always visible" },
                                { term: "Scroll snap", definition: "Page snaps to predefined positions as user scrolls — sections fill viewport, slides lock into place.", prompt: "use scroll-snap on testimonial carousel — each card snaps to center as user scrolls horizontally" },

                                { term: "Drag and drop", definition: "Picking up and moving elements. Needs grab cursor, shadow lift feedback, and landing zones.", prompt: "drag-and-drop reorderable list — items lift with shadow when grabbed, gap appears at drop target" },

                                { term: "Spatial consistency", definition: "Elements should come from and go to logical places. Dropdown opens downward from trigger.", prompt: "notification panel slides in from the right (where bell icon is) and slides back out to right" },
                                { term: "Choreography", definition: "Multiple elements animate in coordinated sequence — not all at once, not randomly, in logical order.", prompt: "choreograph dashboard entrance: sidebar appears, then header, then stat cards stagger, then chart fades" },
                                { term: "Reduced motion", definition: "Respecting prefers-reduced-motion for users who experience motion sickness. Replace animations with fades.", prompt: "add prefers-reduced-motion query — replace slide and scale animations with simple opacity fades" },
                                { term: "Performance", definition: "Only animate transform and opacity — these run on GPU at 60fps. Avoid animating width, height, top, left.", prompt: "refactor animations to only use transform and opacity — the height animations are causing jank" }

            "data-visualization": {
                title: "Data Visualization",
                description: "Chart types, encoding principles, and visualization best practices",
                branches: [
                    {
                        name: "Chart Types",
                        categories: [
                            { name: "Comparison Charts", items: [
                                { term: "Bar chart", definition: "Rectangular bars whose length represents value. Vertical for time, horizontal when labels are long. The workhorse.", prompt: "horizontal bar chart comparing revenue across 8 categories — horizontal so names are readable, sorted descending" },
                                { term: "Grouped bar chart", definition: "Multiple bars side by side for each category. Compares values across categories AND series.", prompt: "grouped bar chart showing Q1 vs Q2 vs Q3 revenue for each region — three bars per region, color-coded", hasImages: true, imageQuery: "grouped+bar+chart+data+visualization" },
                                { term: "Stacked bar chart", definition: "Bars divided into segments stacked on top. Shows total AND composition. Can be misleading for middle segments.", prompt: "stacked bar chart showing monthly expenses by category — each month is one bar, segments show the split" },
                                { term: "Lollipop chart", definition: "A bar chart where the bar is a thin line with dot at end. Cleaner than bars for many categories.", prompt: "lollipop chart for ranking — dot connected by thin line to axis, cleaner than thick bars for 15+ items", hasImages: true, imageQuery: "lollipop+chart+data+visualization" },
                                { term: "Radar / spider chart", definition: "Circular chart with axes radiating from center. Data forms polygon. Good for comparing profiles across dimensions.", prompt: "radar chart comparing three candidates across six competencies — each person a different colored polygon", hasImages: true, imageQuery: "radar+spider+chart+data+visualization" }
                            ]},
                            { name: "Part-to-Whole Charts", items: [
                                { term: "Pie chart", definition: "Circle divided into proportional slices. Works ONLY with 2-5 slices and clear differences. Often the wrong choice.", prompt: "pie chart only if 3-4 categories with clearly different sizes — if slices are similar, use bar chart" },
                                { term: "Donut chart", definition: "Pie chart with hollow center. Center can display a total. Slightly easier to compare than pie slices.", prompt: "donut chart showing budget allocation with total amount in center — 4 categories max" },
                                { term: "Treemap", definition: "Nested rectangles whose area represents value. Great for hierarchical data and relative sizes. Space-efficient.", prompt: "treemap of disk usage — rectangles sized by file size, color-coded by type, biggest offenders obvious", hasImages: true, imageQuery: "treemap+data+visualization+example" },
                                { term: "Waterfall chart", definition: "Bars showing how starting value changes through gains and losses to reach final total.", prompt: "waterfall showing how $1M revenue changed through gains and losses to end at $1.3M — green positive, red negative", hasImages: true, imageQuery: "waterfall+chart+data+visualization" },
                                { term: "Waffle chart", definition: "Grid of squares (usually 10×10=100) with some filled to represent percentage. More intuitive than pie.", prompt: "waffle chart showing 73% completion — 73 of 100 squares filled in blue, remaining in gray", hasImages: true, imageQuery: "waffle+chart+data+visualization" }
                            ]},
                            { name: "Trend & Time Series", items: [
                                { term: "Line chart", definition: "Points connected by lines, typically showing change over time. Multiple lines compare different series.", prompt: "line chart showing daily active users over 6 months — smooth line with shaded area below for emphasis" },
                                { term: "Area chart", definition: "Line chart with space below filled in. Stacked area charts show composition over time.", prompt: "stacked area chart showing traffic sources over time — organic, direct, referral, paid as layered areas" },
                                { term: "Sparkline", definition: "Tiny inline chart embedded in text or table cell. No axes, no labels, just the trend shape.", prompt: "add sparklines next to each metric in the table — small inline lines showing 30-day trend, no axes", hasImages: true, imageQuery: "sparkline+inline+chart+dashboard" },
                                { term: "Candlestick chart", definition: "Financial chart showing open, high, low, close for each period. Each candle tells a price movement story.", prompt: "candlestick chart for stock price — green candles for up days, red for down, volume bar chart below", hasImages: true, imageQuery: "candlestick+chart+stock+data+visualization" }
                            ]},
                            { name: "Distribution & Relationship", items: [
                                { term: "Scatter plot", definition: "Dots on x-y axis, each representing a data point with two variables. Reveals correlations and outliers.", prompt: "scatter plot of price vs satisfaction — look for clusters, outliers, and whether there's correlation" },
                                { term: "Histogram", definition: "Bars showing frequency distribution. Unlike bar charts, the x-axis is continuous.", prompt: "histogram of response times — bin data into 50ms intervals, show how many requests fall in each range" },
                                { term: "Box plot", definition: "Shows distribution through median, quartiles, and outliers. Compact way to compare distributions.", prompt: "box plots comparing salary distributions across 5 departments — median, spread, and outliers side by side", hasImages: true, imageQuery: "box+plot+whisker+data+visualization" },
                                { term: "Heatmap", definition: "Grid where color intensity represents values. Great for time patterns, correlations, or density.", prompt: "heatmap of traffic by day and hour — darker blue = more traffic, shows peak usage patterns", hasImages: true, imageQuery: "heatmap+data+visualization+traffic+pattern" },
                                { term: "Bubble chart", definition: "Scatter plot where third variable is encoded as dot size. Shows three dimensions on 2D plane.", prompt: "bubble chart — x is growth rate, y is profit margin, bubble size is revenue — label the biggest" }
                            ]},
                            { name: "Flow & Connection", items: [
                                { term: "Sankey diagram", definition: "Thick flowing bands showing how values move between categories. Width = magnitude. Great for conversions.", prompt: "Sankey showing user flow through signup — band width shows how many continue vs drop off at each step", hasImages: true, imageQuery: "sankey+diagram+data+visualization" },
                                { term: "Chord diagram", definition: "Circular layout showing relationships. Arcs connect items, thickness shows strength.", prompt: "chord diagram showing collaboration between departments — thicker chords mean more shared projects", hasImages: true, imageQuery: "chord+diagram+data+visualization" },
                                { term: "Network graph", definition: "Dots (nodes) connected by lines (edges). Shows relationships, clusters, influence.", prompt: "network graph of team communication — each person is node, lines connect people who message, thickness = frequency" },
                                { term: "Funnel chart", definition: "Decreasing bars showing progression through stages. Each bar narrower than the last.", prompt: "funnel for sales pipeline — 500 leads at top narrowing to 12 closed deals, conversion percentages between" }
                            ]}
                        ]
                    },
                    {
                        name: "Design Principles",
                        categories: [
                            { name: "Encoding & Clarity", items: [
                                { term: "Position (most accurate)", definition: "Where data point sits relative to axis. Most precise encoding — humans read position best.", prompt: "use position on shared axis for the most important comparison — bar charts leverage position better than pies" },
                                { term: "Length (second most accurate)", definition: "Length of bar or line segment. Bar charts work because we read length well.", prompt: "use bar length for revenue comparison — more accurately readable than area, angle, or color intensity" },
                                { term: "Color as data", definition: "Using hue, saturation, or lightness to encode values. Sequential palettes for continuous data.", prompt: "use sequential color palette (light blue → dark blue) for heatmap — perceptually uniform gradient" },
                                { term: "Annotation", definition: "Text, lines, or markers calling out specific points. Turns a chart into an insight.", prompt: "annotate the March spike: 'Product Hunt launch — 3x normal traffic' — turns data point into story" },
                                { term: "Small multiples", definition: "Same chart repeated for each category, sharing axes. Enables comparison across many categories.", prompt: "small multiples: one line chart per region, all sharing same y-axis — compare trends across 8 regions", hasImages: true, imageQuery: "small+multiples+data+visualization" },
                                { term: "Aspect ratio", definition: "Chart shape changes perception. Wider exaggerates horizontal trends; taller exaggerates vertical.", prompt: "use wider aspect ratio for time series — stretching horizontally makes trend easier to read" }

                                { term: "Brushing / selection", definition: "Highlighting subset by clicking or dragging. Selected points highlight, others dim.", prompt: "add brush selection to scatter plot — drag to select region, selected highlight, unselected fade to gray" },
                                { term: "Zoom and pan", definition: "Zooming into dense charts, panning across large datasets. Essential for time series and maps.", prompt: "add zoom and pan to timeline — users can scroll to zoom on time axis and drag to pan" },
                                { term: "Filter and drill-down", definition: "Controls that let users narrow data — dropdowns, toggles, clickable legends, date pickers.", prompt: "add filter controls: date range picker, multi-select for categories, clickable legend items that toggle series" },
