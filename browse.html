<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domain Maps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #F4F2F0;
            --text-primary: #111111;
            --text-secondary: #777777;
            --text-tertiary: #AAAAAA;
            --accent-hover: #E0DEDC;
            --selection: #000000;
            --selection-text: #FFFFFF;

            --font-stack: 'IBM Plex Mono', 'Menlo', 'Consolas', 'Monaco', monospace;
            --font-size-base: 13px;
            --line-height-base: 1.5;

            --spacing-unit: 24px;
            --indent: 2ch;
            --border-radius: 2px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            font-size: var(--font-size-base);
            line-height: var(--line-height-base);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        ::selection {
            background: var(--selection);
            color: var(--selection-text);
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: var(--spacing-unit);
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            right: 0;
            top: var(--spacing-unit);
            bottom: var(--spacing-unit);
            width: 1px;
            background: rgba(0,0,0,0.06);
        }

        .main-content {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: var(--spacing-unit) 48px;
            display: flex;
            flex-direction: column;
        }

        /* Brand */
        .brand {
            font-weight: 500;
            margin-bottom: 48px;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.4;
        }

        .brand svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* Navigation */
        .nav-section {
            margin-bottom: 32px;
        }

        .nav-header {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            opacity: 0.7;
        }

        .nav-list {
            list-style: none;
        }

        .nav-item {
            display: block;
            padding: 4px 0;
            color: var(--text-secondary);
            cursor: pointer;
            text-decoration: none;
            transition: color 0.15s ease, padding 0.2s ease;
            position: relative;
            padding-left: 0;
        }

        .nav-item:hover {
            color: var(--text-primary);
        }

        .nav-item.active {
            color: var(--text-primary);
            font-weight: 500;
            padding-left: var(--indent);
        }

        .nav-item.active::before {
            content: '\2192';
            position: absolute;
            left: 0;
            font-size: 10px;
            top: 6px;
        }

        /* Domain Header */
        .domain-header {
            margin-bottom: 48px;
            max-width: 800px;
        }

        .domain-meta {
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 11px;
        }

        .domain-title {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .domain-desc {
            color: var(--text-secondary);
            max-width: 500px;
            margin-bottom: 24px;
        }

        /* Branch tabs */
        .branch-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .branch-tab {
            padding: 4px 12px;
            border: 1px solid transparent;
            background: none;
            font-family: var(--font-stack);
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 2px;
            transition: all 0.15s ease;
        }

        .branch-tab:hover {
            color: var(--text-primary);
        }

        .branch-tab.active {
            color: var(--text-primary);
            border-color: rgba(0,0,0,0.2);
            background: rgba(0,0,0,0.03);
        }

        /* Filter */
        .filter-container {
            margin-bottom: 32px;
            position: sticky;
            top: 0;
            background: var(--bg-color);
            padding-bottom: 16px;
            z-index: 10;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .filter-input {
            width: 100%;
            background: transparent;
            border: none;
            font-family: var(--font-stack);
            font-size: 13px;
            color: var(--text-primary);
            outline: none;
            padding: 8px 0;
        }

        .filter-input::placeholder {
            color: var(--text-tertiary);
            font-style: italic;
        }

        /* Grid */
        .ontology-grid {
            column-count: 3;
            column-gap: 48px;
            width: 100%;
            max-width: 1200px;
        }

        @media (max-width: 1200px) {
            .ontology-grid { column-count: 2; }
        }

        @media (max-width: 900px) {
            .ontology-grid { column-count: 1; }
        }

        /* Category blocks */
        .category-block {
            break-inside: avoid;
            margin-bottom: 48px;
        }

        .category-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
        }

        .category-count {
            color: var(--text-tertiary);
        }

        .term-list {
            list-style: none;
        }

        .term-item {
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: baseline;
            transition: opacity 0.2s;
        }

        .term-item:hover {
            opacity: 1 !important;
        }

        .term-list:hover .term-item {
            opacity: 0.4;
        }

        .term-text {
            position: relative;
            padding-right: 8px;
        }

        .term-text::after {
            content: '+';
            position: absolute;
            right: -10px;
            opacity: 0;
            font-size: 10px;
            transition: opacity 0.1s;
        }

        .term-item:hover .term-text::after {
            opacity: 0.5;
        }

        .term-meta {
            color: var(--text-tertiary);
            font-size: 11px;
            margin-left: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .term-item:hover .term-meta {
            opacity: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 32px;
            right: 32px;
            background: var(--text-primary);
            color: var(--bg-color);
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 2px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            pointer-events: none;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.2);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <a href="index.html" class="brand" style="text-decoration: none; color: inherit;">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle></svg>
            <span>DOMAIN MAPS</span>
        </a>

        <nav class="nav-section">

    <main class="main-content">

                ]
            },
            "Fashion Design": {
                description: "Clothing, textiles, and personal expression",
                branches: [
                    {
                        name: "Silhouette & Proportion",
                        categories: [
                            {

                            },
                            {
                                name: "Cross-Cutting Concepts",
                                items: ["Mise en place", "Seasoning in layers", "Resting meat", "Maillard reaction (browning)", "Emulsification", "Starch as thickener", "Acid to finish", "Carry-over cooking", "Bloom spices in fat", "Taste as you go"]
                            }

                ]

        // State
        let currentDomain = "Content Creation";
        let currentBranch = 0;

        // DOM Elements
        const domainNav = document.getElementById('domain-nav');
        const domainMeta = document.getElementById('domain-meta');
        const domainTitle = document.getElementById('domain-title');
        const domainDesc = document.getElementById('domain-desc');
        const branchTabs = document.getElementById('branch-tabs');
        const ontologyGrid = document.getElementById('ontology-grid');
        const filterInput = document.getElementById('filter-input');
        const toast = document.getElementById('toast');

        let toastTimeout;

        // Initialize
        function init() {
            renderNav();
            renderDomain();
        }

        function renderNav() {
            const domains = Object.keys(domainMaps);
            domainNav.innerHTML = domains.map((name, i) => `
                <li class="nav-item ${name === currentDomain ? 'active' : ''}"
                    onclick="selectDomain('${name}')">${name}</li>
            `).join('');
        }

        function selectDomain(name) {
            currentDomain = name;
            currentBranch = 0;
            filterInput.value = '';
            renderNav();
            renderDomain();
            document.querySelector('.main-content').scrollTop = 0;
        }

        function renderDomain() {
            const domain = domainMaps[currentDomain];
            const index = Object.keys(domainMaps).indexOf(currentDomain) + 1;

            domainMeta.textContent = `Index / ${String(index).padStart(2, '0')}`;
            domainTitle.textContent = currentDomain;
            domainDesc.textContent = domain.description;

            // Render branch tabs
            branchTabs.innerHTML = domain.branches.map((branch, i) => `
                <button class="branch-tab ${i === currentBranch ? 'active' : ''}"
                        onclick="selectBranch(${i})">${branch.name}</button>
            `).join('');

            renderCategories();
        }

        function selectBranch(index) {
            currentBranch = index;
            filterInput.value = '';
            renderDomain();
        }

        function renderCategories() {
            const domain = domainMaps[currentDomain];
            const branch = domain.branches[currentBranch];

            ontologyGrid.innerHTML = branch.categories.map(category => `
                <div class="category-block">
                    <div class="category-header">
                        <span>${category.name}</span>
                        <span class="category-count">${String(category.items.length).padStart(2, '0')}</span>
                    </div>
                    <ul class="term-list">
                        ${category.items.map(item => `
                            <li class="term-item" onclick="copyTerm('${item.replace(/'/g, "\\'")}')">
                                <span class="term-text">${item}</span>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `).join('');
        }

        function copyTerm(text) {
            navigator.clipboard.writeText(text);

            toast.textContent = `Copied "${text}"`;
            toast.classList.add('visible');

            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('visible');
            }, 2000);
        }

        // Filter functionality
        filterInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const terms = document.querySelectorAll('.term-item');
            const categories = document.querySelectorAll('.category-block');

            terms.forEach(term => {
                const text = term.innerText.toLowerCase();
                term.classList.toggle('hidden', !text.includes(query));
            });

            // Hide empty categories
            categories.forEach(category => {
                const visibleTerms = category.querySelectorAll('.term-item:not(.hidden)');
                category.classList.toggle('hidden', visibleTerms.length === 0);
            });
        });

        function showAbout() {
            alert('Domain Maps\n\nGiving you just enough categories to help you prompt better.\n\nThe biggest bottleneck to getting good AI output isn\'t the AI — it\'s that people don\'t know the terminology of the domain they\'re working in. If you don\'t know what a "combobox" is, you can\'t ask for one.');
        }

        // Handle URL parameters
        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        // Start
        const urlDomain = getUrlParam('domain');
        if (urlDomain && domainMaps[urlDomain]) {
            currentDomain = urlDomain;
        }
        init();
    </script>

</body>
</html>
